{% extends 'base.html' %}

{% block content %}
<!-- Report Header -->
<div class="d-flex align-items-center justify-content-between mb-4 fade-in">
    <div>
        <h1 class="h3 mb-1 fw-700 text-white">
            <i class="bi bi-file-earmark-bar-graph me-2" style="color:var(--primary);"></i>
            {% block report_title %}{% endblock %}
        </h1>
        <p class="mb-0 text-secondary small">Comprehensive analytical reporting and data export</p>
    </div>
    <div class="d-flex gap-2">
        <button onclick="window.print()" class="btn btn-secondary">
            <i class="bi bi-printer me-1"></i> Print
        </button>
    </div>
</div>

<div class="row fade-in">
    <div class="col-12">
        <div class="card shadow-sm border mb-4">
            <div class="card-body p-4">
                {% block report_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>

<style>
@media print {
    .sidebar, .mobile-header, .breadcrumb, footer, .btn, .search-form { display: none !important; }
    .app { display: block !important; }
    .content { padding: 0 !important; margin: 0 !important; }
    .card { border: 0 !important; box-shadow: none !important; }
    body { background: white !important; color: black !important; }
}
</style>
{% endblock %}
