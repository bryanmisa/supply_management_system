{% if page_obj.has_other_pages %}
  <nav aria-label="Page navigation">
    <ul class="pagination pagination-sm justify-content-center mb-0">
      {% if page_obj.has_previous %}
        <li class="page-item">
          <a class="page-link" href="?page=1" title="First Page"><i class="bi bi-chevron-double-left"></i></a>
        </li>
        <li class="page-item">
          <a class="page-link" href="?page={{ page_obj.previous_page_number }}" title="Previous Page"><i class="bi bi-chevron-left"></i></a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link"><i class="bi bi-chevron-double-left"></i></span>
        </li>
        <li class="page-item disabled">
          <span class="page-link"><i class="bi bi-chevron-left"></i></span>
        </li>
      {% endif %}

      <li class="page-item active">
        <span class="page-link px-4 fw-600">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
      </li>

      {% if page_obj.has_next %}
        <li class="page-item">
          <a class="page-link" href="?page={{ page_obj.next_page_number }}" title="Next Page"><i class="bi bi-chevron-right"></i></a>
        </li>
        <li class="page-item">
          <a class="page-link" href="?page={{ page_obj.paginator.num_pages }}" title="Last Page"><i class="bi bi-chevron-double-right"></i></a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link"><i class="bi bi-chevron-right"></i></span>
        </li>
        <li class="page-item disabled">
          <span class="page-link"><i class="bi bi-chevron-double-right"></i></span>
        </li>
      {% endif %}
    </ul>
  </nav>
{% endif %}

<style>
.pagination .page-link {
    background: var(--surface-hover);
    border-color: var(--border);
    color: var(--text-secondary);
    padding: 0.5rem 0.75rem;
}
.pagination .page-item.active .page-link {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.3);
}
.pagination .page-link:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}
.pagination .page-item.disabled .page-link {
    background: var(--surface-hover);
    border-color: var(--border);
    opacity: 0.3;
}
</style>
